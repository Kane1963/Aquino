<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Cancello</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Cancello ESP32-S3</h1>
<div id="status"></div>

<div>
  <button onclick="sendCmd('apri')">APRI</button>
  <button onclick="sendCmd('chiudi')">CHIUDI</button>
  <button onclick="sendCmd('auto')">AUTO</button>
  <button onclick="sendCmd('manual')">MANUALE</button>
</div>

<div>
  <label>Apertura: <input type="time" id="openTime"></label>
  <label>Chiusura: <input type="time" id="closeTime"></label>
  <button onclick="updateSchedule()">Salva Orari</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
