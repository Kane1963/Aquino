<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cancello Aquino</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
<h1>Cancello Aquino</h1>
<div class="status" id="status">Stato: --</div>

<div style="margin:12px 0;text-align:center;">
  <button class="on" onclick="toggle(true)">APRI</button>
  <button class="off" onclick="toggle(false)">CHIUDI</button>
</div>

<hr>
<label>Modalità:</label>
<select id="modeSelect" onchange="setMode()">
  <option value="auto">Automatica</option>
  <option value="manual">Manuale</option>
</select>

<hr>
<div style="margin:12px 0;text-align:center;">
  <div style="margin-bottom:8px;">
    <label for="openTime">Apertura:</label>
    <input type="time" id="openTime" placeholder="HH:MM">
  </div>
  <div style="margin-bottom:8px;">
    <label for="closeTime">Chiusura:</label>
    <input type="time" id="closeTime" placeholder="HH:MM">
  </div>
  <div style="margin-top:12px;">
    <button onclick="setSchedule()">Salva Orari</button>
  </div>
</div>

</div>
<script src="script.js"></script>
</body>
</html>
