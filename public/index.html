String MAIN_page = R"rawliteral(
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controllo Cancello - Aquino</title>
<style>
body {margin:0;font-family:'Segoe UI',sans-serif;height:100vh;background: url('/sfondo') no-repeat center center fixed;background-size: cover;color:white;display:flex;justify-content:center;align-items:center;}
.card {background:rgba(0,0,0,0.6);border-radius:15px;padding:25px;width:330px;text-align:center;box-shadow:0 8px 20px rgba(0,0,0,0.8);}
h1{font-size:1.6em;}
.status{margin:12px 0;font-size:18px;}
button{width:100%;padding:12px;margin:8px 0;font-size:16px;border:none;border-radius:25px;cursor:pointer;}
.on{background:#00e676;color:#003d1a;}
.off{background:#ff5252;color:#3b0000;}
input{width:100px;padding:10px;margin:8px 4px;border-radius:8px;border:none;}
select{padding:8px;margin:8px 0;border-radius:8px;width:120px;}
</style>
</head>
<body>
<div class="card">
<h1>Cancello di Aquino</h1>
<div class="status" id="status">Stato: --</div>
<div style="margin-bottom:8px;font-size:14px;color:#ccc;">Firmware: <span id="fwVersion">__FIRMWARE_VERSION__</span></div>
<div style="margin-bottom:8px;font-size:14px;color:#ccc;">MQTT Server: <span id="mqttServer">--</span></div>
<div style="margin-bottom:8px;font-size:14px;color:#ccc;">MQTT Porta: <span id="mqttPort">--</span></div>
<div style="margin-bottom:8px;font-size:14px;color:#ccc;">MQTT Stato: <span id="mqttStatus">--</span></div>

<div style="margin:12px 0;text-align:center;">
  <button id="toggleOpen" onclick="toggleLed(true)" class="on">APRI</button>
  <button id="toggleClose" onclick="toggleLed(false)" class="off">CHIUDI</button>
</div>

<hr>
<label>Modalità:</label>
<select id="modeSelect" onchange="setMode()">
  <option value="auto">Automatica</option>
  <option value="manual">Manuale</option>
</select>

<hr>
<div style="margin:12px 0;text-align:center;">
  <div style="margin-bottom:8px;">
    <label for="openTime">Apertura:</label>
    <input type="time" id="openTime" placeholder="HH:MM">
  </div>
  <div style="margin-bottom:8px;">
    <label for="closeTime">Chiusura:</label>
    <input type="time" id="closeTime" placeholder="HH:MM">
  </div>
  <div style="margin-top:12px;">
    <button onclick="setSchedule()">Salva Orari</button>
  </div>
</div>

<hr>
<a href="/upload"><button>Cambia sfondo</button></a>
</div>

<script>
let editingOpen = false;
let editingClose = false;

document.getElementById("openTime").addEventListener("focus", ()=>{ editingOpen=true; });
document.getElementById("openTime").addEventListener("blur", ()=>{ editingOpen=false; });
document.getElementById("closeTime").addEventListener("focus", ()=>{ editingClose=true; });
document.getElementById("closeTime").addEventListener("blur", ()=>{ editingClose=false; });

function updateStatus() {
  fetch("/status").then(r=>r.json()).then(data=>{
    document.getElementById("status").innerHTML="Stato: <b>"+(data.led?"APERTO":"CHIUSO")+"</b>";
    document.getElementById("modeSelect").value = data.autoMode?"auto":"manual";
    if(!editingOpen){
      document.getElementById("openTime").value = data.openHour.toString().padStart(2,'0') + ':' + data.openMinute.toString().padStart(2,'0');
    }
    if(!editingClose){
      document.getElementById("closeTime").value = data.closeHour.toString().padStart(2,'0') + ':' + data.closeMinute.toString().padStart(2,'0');
    }
    document.getElementById("mqttServer").innerText = "__MQTT_SERVER__";
    document.getElementById("mqttPort").innerText = "__MQTT_PORT__";
    document.getElementById("mqttStatus").innerText = "__MQTT_STATUS__";
  });
}

function toggleLed(state){ fetch("/toggle?state="+(state?"on":"off")).then(updateStatus); }
function setSchedule(){
  const open=document.getElementById("openTime").value;
  const close=document.getElementById("closeTime").value;
  fetch(`/schedule?open=${open}&close=${close}`).then(()=>alert("Orari aggiornati"));
}
function setMode(){
  const mode = document.getElementById("modeSelect").value;
  fetch(`/mode?set=${mode}`).then(()=>alert("Modalità aggiornata"));
}

setInterval(updateStatus,1000);
updateStatus();
</script>
</body>
</html>
)rawliteral";
