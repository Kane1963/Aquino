<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controllo Cancello - Aquino</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
<h1>Cancello di Aquino</h1>
<div class="status" id="status">Stato: --</div>
<div class="info">Firmware: <span id="fwVersion">V1.4.0</span></div>
<div class="info">MQTT Server: <span id="mqttServer">--</span></div>
<div class="info">MQTT Porta: <span id="mqttPort">--</span></div>
<div class="info">MQTT Stato: <span id="mqttStatus">--</span></div>

<div class="buttons">
  <button id="toggleOpen" class="on">APRI</button>
  <button id="toggleClose" class="off">CHIUDI</button>
</div>

<hr>
<label>Modalità:</label>
<select id="modeSelect">
  <option value="auto">Automatica</option>
  <option value="manual">Manuale</option>
</select>

<hr>
<div class="schedule">
  <div>
    <label for="openTime">Apertura:</label>
    <input type="time" id="openTime">
  </div>
  <div>
    <label for="closeTime">Chiusura:</label>
    <input type="time" id="closeTime">
  </div>
  <button id="saveSchedule">Salva Orari</button>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
