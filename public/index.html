<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Cancello ESP32-S3</title>
<link rel="stylesheet" href="style.css">
<script src="/socket.io/socket.io.js"></script>
</head>
<body>
<div class="container">
  <h1>Controllo Cancello ESP32-S3</h1>
  <div id="status">Stato: --</div>
  <div>
    <button onclick="sendCmd('apri')">APRI</button>
    <button onclick="sendCmd('chiudi')">CHIUDI</button>
    <button onclick="sendCmd('auto:on')">AUTO ON</button>
    <button onclick="sendCmd('auto:off')">AUTO OFF</button>
  </div>
  <div>
    <p>Apertura: <span id="openTime">--:--</span></p>
    <p>Chiusura: <span id="closeTime">--:--</span></p>
    <p>Modalità: <span id="mode">--</span></p>
  </div>
</div>

<script>
const socket = io();

socket.on("statusUpdate", data => {
  document.getElementById("status").innerText = "Stato: " + (data.led ? "APERTO" : "CHIUSO");
  document.getElementById("mode").innerText = data.autoMode ? "AUTOMATICA" : "MANUALE";
  document.getElementById("openTime").innerText = `${String(data.openHour).padStart(2,'0')}:${String(data.openMinute).padStart(2,'0')}`;
  document.getElementById("closeTime").innerText = `${String(data.closeHour).padStart(2,'0')}:${String(data.closeMinute).padStart(2,'0')}`;
});

function sendCmd(cmd){
  socket.emit("command", cmd);
}
</script>
</body>
</html>
